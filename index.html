<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Safruz Deployer Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #06080c; --bg2: #0d1018; --surface: #121620;
      --border: rgba(212,175,55,0.15); --border2: rgba(212,175,55,0.25);
      --gold: #d4af37; --gold-light: #f0d060; --gold-dark: #b8941f;
      --text: #e8e6dd; --text2: #9a968e; --text3: #5c5850;
      --success: #4caf84; --danger: #d4726a;
      --radius: 12px; --radius2: 18px; --radius3: 28px;
      --font: 'Inter', sans-serif; --mono: 'JetBrains Mono', monospace; --classic: 'Cormorant Garamond', serif;
      --transition: 0.25s ease;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); font-family:var(--font); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px; background-attachment:fixed; background-image:radial-gradient(ellipse 70% 50% at 50% -10%, rgba(212,175,55,0.06) 0%, transparent 70%); }
    .login-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(6,8,12,0.96); backdrop-filter:blur(30px); z-index:1000; display:flex; align-items:center; justify-content:center; }
    .login-overlay.hidden { display:none; }
    .login-card { width:100%; max-width:420px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius3); padding:36px 28px; text-align:center; box-shadow:var(--shadow); }
    .login-logo { font-size:2.4rem; color:var(--gold); margin-bottom:12px; }
    .login-card h2 { font-family:var(--classic); font-size:1.8rem; font-weight:700; color:var(--gold); }
    .step-indicator { display:flex; justify-content:center; gap:10px; margin:18px 0; }
    .step-dot { width:8px; height:8px; border-radius:50%; background:var(--border); border:1px solid var(--border); }
    .step-dot.active { background:var(--gold); border-color:var(--gold); }
    .login-form-step { display:none; }
    .login-form-step.active { display:block; animation:fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .input-group { margin-bottom:14px; text-align:left; }
    .input-group label { display:block; font-size:0.68rem; color:var(--text2); margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
    .input-wrapper { position:relative; }
    .input-wrapper i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--gold); opacity:0.7; }
    .input-wrapper input { width:100%; padding:13px 14px 13px 40px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:0.85rem; }
    .input-wrapper input:focus { outline:none; border-color:var(--gold); }
    .btn { padding:13px 20px; border:none; border-radius:var(--radius); font-weight:600; font-size:0.85rem; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:8px; text-transform:uppercase; }
    .btn-primary { background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:#1a1a0a; width:100%; }
    .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text2); width:100%; }
    .login-error { color:var(--danger); font-size:0.75rem; margin-top:8px; }
    .form-link { margin-top:14px; font-size:0.78rem; color:var(--text3); }
    .form-link span { color:var(--gold); cursor:pointer; font-weight:600; }

    .app-container { display:none; width:100%; max-width:1300px; position:relative; z-index:1; }
    .app-container.show { display:flex; gap:18px; }
    .sidebar { width:270px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius3); padding:20px 14px; display:flex; flex-direction:column; gap:14px; box-shadow:var(--shadow); position:sticky; top:16px; height:calc(100vh - 40px); border-top:2px solid var(--gold-dark); }
    .sidebar-nav { flex:1; display:flex; flex-direction:column; gap:2px; }
    .sidebar-nav a { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:var(--radius); color:var(--text2); font-size:0.8rem; cursor:pointer; border-left:3px solid transparent; }
    .sidebar-nav a i { width:18px; }
    .sidebar-nav a:hover { background:rgba(212,175,55,0.04); color:var(--text); }
    .sidebar-nav a.active { background:linear-gradient(90deg,rgba(212,175,55,0.1),transparent); color:var(--gold); border-left-color:var(--gold); font-weight:600; }
    .sidebar-footer { border-top:1px solid var(--border); padding-top:12px; display:flex; flex-direction:column; gap:8px; }
    .user-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:#1a1a0a; display:flex; align-items:center; justify-content:center; font-weight:700; }
    .btn-logout-side { width:100%; padding:9px; border:1px solid var(--border); background:transparent; color:var(--text2); border-radius:var(--radius); cursor:pointer; font-size:0.7rem; }
    .main-content { flex:1; display:flex; flex-direction:column; gap:14px; }
    .top-bar { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius3); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow); border-bottom:2px solid var(--gold-dark); }
    .content-area { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius3); padding:22px; box-shadow:var(--shadow); flex:1; overflow-y:auto; max-height:calc(100vh - 150px); }
    .page { display:none; animation:fadeIn 0.3s ease; }
    .page.active { display:block; }
    .toast { position:fixed; top:16px; right:16px; padding:12px 18px; border-radius:var(--radius); font-size:0.8rem; z-index:2000; backdrop-filter:blur(14px); display:none; }
    .toast.show { display:block; }
    .toast.success { background:rgba(76,175,132,0.12); border:1px solid var(--success); color:var(--success); }
    .toast.error { background:rgba(212,114,106,0.12); border:1px solid var(--danger); color:var(--danger); }
  </style>
</head>
<body>
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-logo"><i class="fas fa-crown"></i></div>
      <h2>Safruz Deployer</h2>
      <p class="subtitle" style="color:var(--text3);margin-bottom:20px;">Premium Deployment Platform</p>
      <div id="googleSignIn" style="margin-bottom:16px;"></div>
      <div class="divider" style="display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text3);font-size:0.75rem;"><span style="flex:1;height:1px;background:var(--border);"></span>atau<span style="flex:1;height:1px;background:var(--border);"></span></div>

      <!-- Login Form -->
      <div class="login-form-step active" id="loginStep">
        <div class="input-group"><label>Email</label><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email"></div></div>
        <div class="input-group"><label>Password</label><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="loginPass" placeholder="Password"></div></div>
        <div class="login-error" id="loginError"></div>
        <button class="btn btn-primary" id="btnLogin">Masuk</button>
        <div class="form-link">Belum punya akun? <span id="showRegisterLink">Daftar</span></div>
        <div class="form-link"><span id="showForgotLink">Lupa password?</span></div>
      </div>

      <!-- Register Form -->
      <div class="login-form-step" id="registerStep">
        <div class="input-group"><label>Email</label><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="regEmail"></div></div>
        <div class="input-group"><label>Nama</label><div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="regName"></div></div>
        <div class="input-group"><label>Password</label><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="regPass"></div></div>
        <div class="input-group"><label>Pertanyaan Keamanan</label><div class="input-wrapper"><i class="fas fa-question"></i><input type="text" id="regQuestion" placeholder="Contoh: Nama hewan?"></div></div>
        <div class="input-group"><label>Jawaban</label><div class="input-wrapper"><i class="fas fa-shield-alt"></i><input type="text" id="regAnswer"></div></div>
        <div class="login-error" id="regError"></div>
        <button class="btn btn-primary" id="btnRegister">Daftar</button>
        <div class="form-link"><span id="showLoginLink">Kembali login</span></div>
      </div>

      <!-- Verifikasi Email -->
      <div class="login-form-step" id="verifyStep">
        <p style="color:var(--text2);margin-bottom:12px;">Masukkan kode verifikasi yang dikirim</p>
        <div class="input-group"><label>Kode</label><div class="input-wrapper"><i class="fas fa-key"></i><input type="text" id="verifyCode"></div></div>
        <div class="login-error" id="verifyError"></div>
        <button class="btn btn-primary" id="btnVerify">Verifikasi</button>
      </div>

      <!-- Lupa Password -->
      <div class="login-form-step" id="forgotStep">
        <div class="input-group"><label>Email</label><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="forgotEmail"></div></div>
        <button class="btn btn-primary" id="btnForgot">Kirim</button>
        <div class="form-link"><span id="backToLoginFromForgot">Kembali</span></div>
      </div>

      <!-- Reset Password -->
      <div class="login-form-step" id="resetStep">
        <p style="color:var(--text2);">Jawab pertanyaan: <span id="resetQuestion"></span></p>
        <div class="input-group"><label>Jawaban</label><div class="input-wrapper"><i class="fas fa-shield-alt"></i><input type="text" id="resetAnswer"></div></div>
        <div class="input-group"><label>Password Baru</label><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="resetNewPass"></div></div>
        <div class="login-error" id="resetError"></div>
        <button class="btn btn-primary" id="btnReset">Reset Password</button>
        <div class="form-link"><span id="backToLoginFromReset">Kembali</span></div>
      </div>
    </div>
  </div>

  <div class="app-container" id="appContainer">
    <aside class="sidebar">
      <div class="sidebar-header" style="text-align:center;"><div class="sidebar-logo" style="font-size:1.6rem;color:var(--gold);"><i class="fas fa-crown"></i></div><div class="sidebar-title" style="font-family:var(--classic);font-weight:700;color:var(--gold);">Safruz Deployer</div></div>
      <nav class="sidebar-nav">
        <a data-page="dashboard" class="active"><i class="fas fa-th-large"></i> Dashboard</a>
        <a data-page="deploy"><i class="fas fa-rocket"></i> Deploy</a>
        <a data-page="redeploy"><i class="fas fa-sync-alt"></i> Redeploy</a>
        <a data-page="tools"><i class="fas fa-tools"></i> Tools</a>
        <a data-page="chat"><i class="fas fa-comments"></i> Chat</a>
        <a data-page="owner" id="navOwner" style="display:none"><i class="fas fa-crown"></i> Owner Panel</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card" style="display:flex;align-items:center;gap:10px;"><div class="user-avatar" id="sidebarAvatar">U</div><div><div class="user-name-side" id="sidebarName" style="font-weight:600;"></div></div></div>
        <button class="btn-logout-side" id="btnLogoutSide">Keluar</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="top-bar"><div class="top-bar-title" style="font-family:var(--classic);font-weight:700;color:var(--gold);" id="pageTitle">Dashboard</div><div id="mainTime" style="font-family:var(--mono);font-size:0.8rem;color:var(--text2);">--:--</div></div>
      <div class="content-area" id="contentArea"></div>
      <div class="watermark" style="text-align:center;font-size:0.65rem;color:var(--text3);margin-top:8px;"><i class="fas fa-crown"></i> Hosting by <strong>Safruz</strong></div>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const API_BASE = '';
    const $ = id => document.getElementById(id);
    function toast(msg, type='success') { const t=$('toast'); t.textContent=msg; t.className=`toast show ${type}`; setTimeout(()=>t.classList.remove('show'),3500); }
    function sanitize(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

    class App {
      constructor() {
        this.token = localStorage.getItem('token') || '';
        this.user = null; this.isOwner = false; this.isPremium = false;
        this.deployState = { projectName:'safrul-deploy', htmlCode:'', files:[] };
        this.redeployState = { url:'', projectName:'', htmlCode:'', files:[] };
        this.init();
      }
      async api(endpoint, method='GET', body=null) {
        const h = {'Content-Type':'application/json'};
        if(this.token) h['Authorization'] = 'Bearer '+this.token;
        const res = await fetch(API_BASE+endpoint, { method, headers:h, body:body?JSON.stringify(body):null });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || 'Gagal');
        return data;
      }
      init() {
        this.bindLogin();
        this.bindNav();
        this.render('dashboard');
        setInterval(()=>{ $('mainTime').textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }, 1000);
        if(this.token) this.loadProfile().then(()=>this.showApp()).catch(()=>{ this.token=''; localStorage.removeItem('token'); });
        window.google?.accounts?.id?.initialize({
          client_id: '444990826020-jksl4mrpp95oibhvi89ap47csatofsfm.apps.googleusercontent.com',
          callback: this.handleGoogleLogin.bind(this)
        });
        window.google?.accounts?.id?.renderButton($('googleSignIn'), { theme:'outline', size:'large', text:'signin_with', shape:'pill' });
      }
      setStep(s) {
        const steps = ['loginStep','registerStep','verifyStep','forgotStep','resetStep'];
        steps.forEach((id,i)=> $(id).classList.toggle('active', i+1===s));
      }
      bindLogin() {
        $('btnLogin').onclick = ()=>this.login();
        $('showRegisterLink').onclick = ()=> this.setStep(2);
        $('showLoginLink').onclick = ()=> this.setStep(1);
        $('btnRegister').onclick = ()=>this.register();
        $('btnVerify').onclick = ()=>this.verifyEmail();
        $('showForgotLink').onclick = ()=> this.setStep(4);
        $('btnForgot').onclick = ()=>this.forgotPassword();
        $('backToLoginFromForgot').onclick = ()=> this.setStep(1);
        $('btnReset').onclick = ()=>this.resetPassword();
        $('backToLoginFromReset').onclick = ()=> this.setStep(1);
      }
      async handleGoogleLogin(response) {
        try {
          const res = await this.api('/api/auth/google', 'POST', { credential: response.credential });
          this.token = res.access_token; localStorage.setItem('token', res.access_token);
          this.user = res.email; this.isOwner = res.role === 'owner'; this.isPremium = res.role === 'premium';
          this.showApp();
        } catch(e) { toast('Login Google gagal: '+e.message, 'error'); }
      }
      async login() {
        const e = $('loginEmail').value.trim().toLowerCase(), p = $('loginPass').value;
        if(!p) { $('loginError').textContent='Masukkan password'; return; }
        try {
          const res = await this.api('/api/auth/login', 'POST', { email:e, password:p });
          this.token = res.access_token; localStorage.setItem('token', res.access_token);
          this.user = e; this.isOwner = res.role === 'owner'; this.isPremium = res.role === 'premium';
          this.showApp();
        } catch(e) { $('loginError').textContent = e.message; }
      }
      async register() {
        const e=$('regEmail').value.trim().toLowerCase(), p=$('regPass').value, n=$('regName').value.trim(), q=$('regQuestion').value.trim(), a=$('regAnswer').value.trim();
        if(!e||!p||!n||!q||!a) { $('regError').textContent='Semua field wajib diisi'; return; }
        try {
          const res = await this.api('/api/auth/register', 'POST', { email:e, password:p, name:n, security_question:q, security_answer:a });
          this._pendingEmail = e;
          this.setStep(3);
          toast('Kode verifikasi: '+res.verification_code);
          $('verifyCode').value = res.verification_code;
        } catch(e) { $('regError').textContent = e.message; }
      }
      async verifyEmail() {
        const code = $('verifyCode').value.trim();
        if(!code) return;
        try {
          await this.api('/api/auth/verify-email', 'POST', { email:this._pendingEmail, code });
          toast('Email terverifikasi! Silakan login.');
          this.setStep(1);
        } catch(e) { $('verifyError').textContent = e.message; }
      }
      async forgotPassword() {
        const e = $('forgotEmail').value.trim().toLowerCase();
        if(!e) return;
        try {
          const res = await this.api('/api/auth/forgot-password', 'POST', { email:e });
          this._pendingEmail = e;
          $('resetQuestion').textContent = res.security_question;
          this.setStep(5);
        } catch(e) { toast(e.message,'error'); }
      }
      async resetPassword() {
        const ans = $('resetAnswer').value.trim(), newP = $('resetNewPass').value;
        if(!ans||!newP) { $('resetError').textContent='Isi semua'; return; }
        try {
          await this.api('/api/auth/reset-password', 'POST', { email:this._pendingEmail, security_answer:ans, new_password:newP });
          toast('Password direset! Silakan login.');
          this.setStep(1);
        } catch(e) { $('resetError').textContent = e.message; }
      }
      async loadProfile() {
        const res = await this.api('/api/user/me');
        this.user = res.username; this.isOwner = res.role === 'owner'; this.isPremium = res.role === 'premium';
      }
      logout() {
        this.token=''; localStorage.removeItem('token'); this.user=null; this.isOwner=false;
        $('appContainer').classList.remove('show'); $('loginOverlay').classList.remove('hidden');
      }
      showApp() {
        $('loginOverlay').classList.add('hidden'); $('appContainer').classList.add('show');
        $('sidebarName').textContent = this.user; $('sidebarAvatar').textContent = this.user[0].toUpperCase();
        $('navOwner').style.display = this.isOwner ? 'flex' : 'none';
      }
      bindNav() {
        document.querySelectorAll('.sidebar-nav a').forEach(a=>a.onclick = ()=> this.navigate(a.dataset.page));
      }
      navigate(page) {
        document.querySelectorAll('.sidebar-nav a').forEach(a=>a.classList.remove('active'));
        const nav = document.querySelector(`.sidebar-nav a[data-page="${page}"]`);
        if(nav) nav.classList.add('active');
        $('pageTitle').textContent = { dashboard:'Dashboard', deploy:'Deploy', redeploy:'Redeploy', tools:'Tools', chat:'Chat', owner:'Owner Panel' }[page]||'Dashboard';
        this.render(page);
      }
      render(page) {
        const area = $('contentArea');
        const t = {
          dashboard: `<div><h2 style="color:var(--gold);">Dashboard</h2><p>Selamat datang!</p></div>`,
          deploy: `<div><h2 style="color:var(--gold);">Deploy</h2><div class="upload-zone" id="uploadZone"><i class="fas fa-cloud-upload-alt"></i> Drop file</div><input type="file" id="fileInput" multiple style="display:none;"><textarea class="form-textarea" id="htmlCode">${this.deployState.htmlCode}</textarea><input class="form-input" id="projectName" value="${this.deployState.projectName}"><button class="btn btn-primary" id="deployBtn">Deploy</button></div>`,
          redeploy: `<div><h2 style="color:var(--gold);">Redeploy</h2><input class="form-input" id="redeployUrl" value="${this.redeployState.url}"><input class="form-input" id="redeployProjectName" value="${this.redeployState.projectName}"><div class="upload-zone" id="uploadZoneRedeploy"><i class="fas fa-cloud-upload-alt"></i> Drop file baru</div><input type="file" id="fileInputRedeploy" multiple style="display:none;"><textarea class="form-textarea" id="htmlCodeRedeploy">${this.redeployState.htmlCode}</textarea><button class="btn btn-primary" id="redeployBtn">Update</button></div>`,
          tools: `<div><h2 style="color:var(--gold);">Tools</h2></div>`,
          chat: `<div><h2 style="color:var(--gold);">Chat</h2></div>`,
          owner: `<div><h2 style="color:var(--gold);">Owner Panel</h2></div>`
        };
        area.innerHTML = t[page] || '';
        if(page==='deploy') this.bindDeploy();
        if(page==='redeploy') this.bindRedeploy();
      }
      bindDeploy() { /* setup upload & deploy */ }
      bindRedeploy() { /* setup upload & redeploy */ }
    }
    window.app = new App();
    $('btnLogoutSide').onclick = ()=>window.app.logout();
  </script>
</body>
</html>
