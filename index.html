      <!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Safruz Deployer Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #06080c; --bg2: #0d1018; --surface: #121620;
      --border: rgba(212,175,55,0.12); --border2: rgba(212,175,55,0.25);
      --gold: #d4af37; --gold-light: #f0d060; --gold-dark: #b8941f;
      --text: #e8e6dd; --text2: #9a968e; --text3: #5c5850;
      --success: #4caf84; --danger: #d4726a;
      --radius: 12px; --radius2: 18px; --radius3: 28px;
      --font: 'Inter', sans-serif; --mono: 'JetBrains Mono', monospace; --classic: 'Cormorant Garamond', serif;
      --transition: 0.2s ease;
      --shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg); font-family: var(--font); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 16px;
      background-image: radial-gradient(ellipse 70% 50% at 50% -10%, rgba(212,175,55,0.05) 0%, transparent 70%);
    }
    .login-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(6,8,12,0.96); backdrop-filter: blur(30px); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .login-overlay.hidden { display: none; }
    .login-card {
      width: 100%; max-width: 420px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius3);
      padding: 36px 28px; text-align: center; box-shadow: var(--shadow);
    }
    .login-logo { font-size: 2.4rem; color: var(--gold); margin-bottom: 12px; }
    .login-card h2 { font-family: var(--classic); font-size: 1.8rem; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
    .login-card .subtitle { color: var(--text3); font-size: 0.82rem; margin-bottom: 22px; }
    .step-indicator { display: flex; justify-content: center; gap: 10px; margin-bottom: 18px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); border: 1px solid var(--border); }
    .step-dot.active { background: var(--gold); border-color: var(--gold); }
    .login-form-step { display: none; }
    .login-form-step.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .input-group { margin-bottom: 14px; text-align: left; }
    .input-group label { display: block; font-size: 0.68rem; color: var(--text2); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gold); opacity: 0.7; font-size: 0.85rem; }
    .input-wrapper input { width: 100%; padding: 13px 14px 13px 40px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.85rem; transition: var(--transition); }
    .input-wrapper input:focus { outline: none; border-color: var(--gold); }
    .btn { padding: 13px 20px; border: none; border-radius: var(--radius); font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.3px; }
    .btn-primary { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #1a1a0a; width: 100%; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,175,55,0.3); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); width: 100%; }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .btn-sm { padding: 8px 16px; font-size: 0.7rem; width: auto; }
    .login-error { color: var(--danger); font-size: 0.75rem; margin-top: 8px; min-height: 18px; }
    .form-link { margin-top: 14px; font-size: 0.78rem; color: var(--text3); }
    .form-link span { color: var(--gold); cursor: pointer; font-weight: 600; }
    .form-link span:hover { text-decoration: underline; }

    .app-container { display: none; width: 100%; max-width: 1200px; position: relative; z-index: 1; }
    .app-container.show { display: flex; gap: 18px; }
    .sidebar {
      width: 260px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius3); padding: 20px 14px; display: flex; flex-direction: column; gap: 14px;
      box-shadow: var(--shadow); position: sticky; top: 16px; height: calc(100vh - 40px);
      border-top: 2px solid var(--gold-dark);
    }
    .sidebar-header { text-align: center; }
    .sidebar-logo { font-size: 1.6rem; color: var(--gold); }
    .sidebar-title { font-family: var(--classic); font-weight: 700; font-size: 1.1rem; color: var(--gold); margin-top: 2px; }
    .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border-radius: var(--radius); color: var(--text2); text-decoration: none;
      font-size: 0.78rem; font-weight: 500; cursor: pointer; border-left: 3px solid transparent;
      transition: var(--transition);
    }
    .sidebar-nav a i { width: 18px; text-align: center; }
    .sidebar-nav a:hover { background: rgba(212,175,55,0.04); color: var(--text); }
    .sidebar-nav a.active { background: linear-gradient(90deg, rgba(212,175,55,0.1), transparent); color: var(--gold); border-left-color: var(--gold); font-weight: 600; }
    .sidebar-footer { border-top: 1px solid var(--border); padding-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .user-card { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #1a1a0a; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem;
    }
    .user-name-side { font-weight: 600; font-size: 0.8rem; }
    .btn-logout-side {
      width: 100%; padding: 9px; border: 1px solid var(--border); background: transparent;
      color: var(--text2); border-radius: var(--radius); cursor: pointer; font-size: 0.7rem; text-align: center;
    }
    .btn-logout-side:hover { border-color: var(--danger); color: var(--danger); }

    .main-content { flex: 1; display: flex; flex-direction: column; gap: 14px; min-width: 0; }
    .top-bar {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius3);
      padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow); border-bottom: 2px solid var(--gold-dark);
    }
    .top-bar-title { font-family: var(--classic); font-weight: 700; font-size: 1.2rem; color: var(--gold); }
    .content-area {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius3);
      padding: 20px; box-shadow: var(--shadow); flex: 1; overflow-y: auto; max-height: calc(100vh - 150px);
    }
    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.3s ease; }

    .section { margin-bottom: 18px; }
    .section-title { font-family: var(--classic); font-weight: 700; font-size: 1rem; color: var(--gold); margin-bottom: 10px; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); padding: 16px; }
    .form-input, .form-textarea {
      width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 14px; color: var(--text); font-family: var(--font); font-size: 0.8rem;
      transition: var(--transition); margin-bottom: 8px;
    }
    .form-textarea { min-height: 100px; resize: vertical; }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--gold); }
    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius2); padding: 24px;
      text-align: center; cursor: pointer; margin-bottom: 10px; transition: var(--transition);
    }
    .upload-zone:hover { border-color: var(--gold); }
    .file-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .file-chip {
      display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; font-size: 0.7rem;
    }
    .file-chip .chip-remove { cursor: pointer; color: var(--text3); }
    .file-chip .chip-remove:hover { color: var(--danger); }
    .chat-container { display: flex; flex-direction: column; height: 55vh; border: 1px solid var(--border); border-radius: var(--radius2); overflow: hidden; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .chat-msg { max-width: 75%; padding: 8px 12px; border-radius: var(--radius); font-size: 0.8rem; line-height: 1.4; }
    .chat-msg.sent { align-self: flex-end; background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #1a1a0a; }
    .chat-msg.received { align-self: flex-start; background: var(--bg); border: 1px solid var(--border); }

    .toast {
      position: fixed; top: 16px; right: 16px; padding: 12px 18px; border-radius: var(--radius);
      font-size: 0.78rem; font-weight: 500; z-index: 2000; backdrop-filter: blur(14px);
      display: none; box-shadow: var(--shadow);
    }
    .toast.show { display: block; animation: fadeIn 0.3s ease; }
    .toast.success { background: rgba(76,175,132,0.12); border: 1px solid var(--success); color: var(--success); }
    .toast.error { background: rgba(212,114,106,0.12); border: 1px solid var(--danger); color: var(--danger); }
    .watermark { text-align: center; padding-top: 12px; margin-top: 8px; border-top: 1px solid var(--border); font-size: 0.65rem; color: var(--text3); }

    @media (max-width: 768px) {
      .app-container.show { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; }
      .sidebar-nav { flex-direction: row; flex-wrap: wrap; }
      .sidebar-nav a { font-size: 0.7rem; padding: 8px 10px; border-left: none; border-bottom: 2px solid transparent; }
      .sidebar-nav a.active { border-bottom-color: var(--gold); border-left-color: transparent; }
    }
  </style>
</head>
<body>
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-logo"><i class="fas fa-crown"></i></div>
      <h2>Safruz Deployer</h2>
      <p class="subtitle">Ultimate Deployment Platform</p>
      <div class="step-indicator"><span class="step-dot active" id="stepDot1"></span><span class="step-dot" id="stepDot2"></span><span class="step-dot" id="stepDot3"></span></div>
      <!-- Step 1: Email -->
      <div class="login-form-step active" id="loginStep1">
        <div class="input-group"><label>Email</label><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Masukkan email"></div></div>
        <button class="btn btn-primary" id="btnNext">Berikutnya</button>
        <div class="form-link">Belum punya akun? <span id="showRegisterLink">Daftar</span></div>
        <div class="form-link"><span id="showForgotLink">Lupa password?</span></div>
      </div>
      <!-- Step 2: Password -->
      <div class="login-form-step" id="loginStep2">
        <div class="input-group"><label>Password</label><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="loginPass" placeholder="Password"></div></div>
        <div class="login-error" id="loginError"></div>
        <button class="btn btn-primary" id="btnLogin">Masuk</button>
        <button class="btn btn-ghost" id="btnBackLogin" style="margin-top:8px;">Kembali</button>
      </div>
      <!-- Step 3: Security (opsional) -->
      <div class="login-form-step" id="loginStep3">
        <p style="color:var(--text2);margin-bottom:12px;">Verifikasi Keamanan</p>
        <div class="input-group"><label>Jawaban Pertanyaan</label><div class="input-wrapper"><i class="fas fa-shield-alt"></i><input type="text" id="securityAnswer" placeholder="Jawaban Anda"></div></div>
        <div class="login-error" id="securityError"></div>
        <button class="btn btn-primary" id="btnVerifySecurity">Verifikasi</button>
        <button class="btn btn-ghost" id="btnBackSecurity" style="margin-top:8px;">Kembali</button>
      </div>
      <!-- Register Step -->
      <div class="login-form-step" id="registerStep">
        <div class="input-group"><label>Email</label><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Email"></div></div>
        <div class="input-group"><label>Nama</label><div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="regName" placeholder="Nama"></div></div>
        <div class="input-group"><label>Password</label><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="regPass" placeholder="Password"></div></div>
        <div class="input-group"><label>Pertanyaan Keamanan</label><div class="input-wrapper"><i class="fas fa-question"></i><input type="text" id="regQuestion" placeholder="Contoh: Nama hewan?"></div></div>
        <div class="input-group"><label>Jawaban</label><div class="input-wrapper"><i class="fas fa-shield-alt"></i><input type="text" id="regAnswer" placeholder="Jawaban"></div></div>
        <div class="login-error" id="regError"></div>
        <button class="btn btn-primary" id="btnRegister">Daftar</button>
        <div class="form-link"><span id="showLoginLink">Kembali login</span></div>
      </div>
      <!-- Verifikasi Email -->
      <div class="login-form-step" id="verifyStep">
        <p style="color:var(--text2);margin-bottom:12px;">Verifikasi Email</p>
        <div class="input-group"><label>Kode Verifikasi</label><div class="input-wrapper"><i class="fas fa-key"></i><input type="text" id="verifyCode" placeholder="Masukkan kode"></div></div>
        <div class="login-error" id="verifyError"></div>
        <button class="btn btn-primary" id="btnVerifyEmail">Verifikasi</button>
      </div>
      <!-- Lupa Password -->
      <div class="login-form-step" id="forgotStep">
        <div class="input-group"><label>Email</label><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="forgotEmail" placeholder="Email"></div></div>
        <button class="btn btn-primary" id="btnForgotPassword">Kirim</button>
        <div class="form-link"><span id="backToLoginLink">Kembali login</span></div>
      </div>
      <!-- Reset Password -->
      <div class="login-form-step" id="resetStep">
        <p style="color:var(--text2);margin-bottom:8px;">Jawab pertanyaan: <span id="resetQuestion"></span></p>
        <div class="input-group"><label>Jawaban</label><div class="input-wrapper"><i class="fas fa-shield-alt"></i><input type="text" id="resetAnswer" placeholder="Jawaban"></div></div>
        <div class="input-group"><label>Password Baru</label><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="resetNewPass" placeholder="Password baru"></div></div>
        <div class="login-error" id="resetError"></div>
        <button class="btn btn-primary" id="btnResetPassword">Reset Password</button>
        <div class="form-link"><span id="backToLoginFromReset">Kembali</span></div>
      </div>
    </div>
  </div>

  <div class="app-container" id="appContainer">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo"><i class="fas fa-crown"></i></div><div class="sidebar-title">Safruz Deployer</div></div>
      <nav class="sidebar-nav">
        <a data-page="dashboard" class="active"><i class="fas fa-th-large"></i> Dashboard</a>
        <a data-page="deploy"><i class="fas fa-rocket"></i> Deploy</a>
        <a data-page="redeploy"><i class="fas fa-sync-alt"></i> Redeploy</a>
        <a data-page="tools"><i class="fas fa-tools"></i> Tools</a>
        <a data-page="chat"><i class="fas fa-comments"></i> Chat</a>
        <a data-page="owner" id="navOwner" style="display:none"><i class="fas fa-crown"></i> Owner Panel</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card"><div class="user-avatar" id="sidebarAvatar">U</div><div><div class="user-name-side" id="sidebarName">User</div></div></div>
        <button class="btn-logout-side" id="btnLogoutSide">Keluar</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="top-bar"><div class="top-bar-title" id="pageTitle">Dashboard</div><div id="mainTime" style="font-family:var(--mono);font-size:0.8rem;color:var(--text2);">--:--</div></div>
      <div class="content-area" id="contentArea"></div>
      <div class="watermark"><i class="fas fa-crown"></i> Hosting by <strong>Safruz</strong></div>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '';
    const $ = id => document.getElementById(id);
    function toast(msg, type='success') { const t=$('toast'); t.textContent=msg; t.className=`toast show ${type}`; setTimeout(()=>t.classList.remove('show'),3500); }
    function sanitize(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    class App {
      constructor() {
        this.token = localStorage.getItem('token') || '';
        this.user = null; this.isOwner = false;
        this.deployState = { projectName:'safrul-deploy', htmlCode:'', files:[] };
        this.redeployState = { url:'', projectName:'', htmlCode:'', files:[] };
        this.init();
      }
      async api(endpoint, method='GET', body=null) {
        const h = { 'Content-Type':'application/json' };
        if (this.token) h['Authorization'] = 'Bearer '+this.token;
        const res = await fetch(API_BASE+endpoint, { method, headers: h, body: body ? JSON.stringify(body) : null });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Gagal');
        return data;
      }
      init() {
        this.bindLogin();
        this.bindNav();
        this.render('dashboard');
        setInterval(() => { $('mainTime').textContent = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }, 1000);
        if (this.token) this.loadProfile().then(() => this.showApp()).catch(() => { this.token=''; localStorage.removeItem('token'); });
      }
      setStep(s) {
        const steps = ['loginStep1','loginStep2','loginStep3','registerStep','verifyStep','forgotStep','resetStep'];
        steps.forEach((id,i) => $(id).classList.toggle('active', i+1===s));
        for (let i=1; i<=7; i++) $(`stepDot${i}`)?.classList.toggle('active', i<=s);
      }
      bindLogin() {
        $('btnNext').onclick = () => { const e=$('loginEmail').value.trim(); if(!e) return toast('Masukkan email','error'); this.setStep(2); $('loginPass').focus(); };
        $('btnBackLogin').onclick = () => this.setStep(1);
        $('btnLogin').onclick = () => this.doLogin();
        $('showRegisterLink').onclick = () => this.setStep(4);
        $('showLoginLink').onclick = () => this.setStep(1);
        $('btnRegister').onclick = () => this.doRegister();
        $('btnVerifyEmail').onclick = () => this.verifyEmail();
        $('btnBackSecurity').onclick = () => this.setStep(2);
        $('btnVerifySecurity').onclick = () => this.verifySecurity();
        $('showForgotLink').onclick = () => this.setStep(6);
        $('btnForgotPassword').onclick = () => this.forgotPassword();
        $('backToLoginLink').onclick = () => this.setStep(1);
        $('btnResetPassword').onclick = () => this.resetPassword();
        $('backToLoginFromReset').onclick = () => this.setStep(1);
      }
      async doLogin() {
        const e = $('loginEmail').value.trim().toLowerCase(), p = $('loginPass').value;
        if (!p) { $('loginError').textContent = 'Masukkan password'; return; }
        try {
          const res = await this.api('/api/auth/login', 'POST', { email: e, password: p });
          if (res.requires_security) {
            this._pendingEmail = e; this._pendingPass = p;
            this.setStep(3); $('securityAnswer').placeholder = res.security_question || 'Jawaban'; return;
          }
          this.token = res.access_token; localStorage.setItem('token', res.access_token);
          this.user = e; this.isOwner = res.role === 'owner';
          this.showApp();
        } catch(e) { $('loginError').textContent = e.message; }
      }
      async verifySecurity() {
        const ans = $('securityAnswer').value.trim();
        if (!ans) { $('securityError').textContent = 'Masukkan jawaban'; return; }
        try {
          const res = await this.api('/api/auth/login', 'POST', { email: this._pendingEmail, password: this._pendingPass, security_answer: ans });
          this.token = res.access_token; localStorage.setItem('token', res.access_token);
          this.user = this._pendingEmail; this.isOwner = res.role === 'owner';
          this.showApp();
        } catch(e) { $('securityError').textContent = e.message; }
      }
      async doRegister() {
        const e=$('regEmail').value.trim().toLowerCase(), p=$('regPass').value, n=$('regName').value.trim(), q=$('regQuestion').value.trim(), a=$('regAnswer').value.trim();
        if (!e||!p||!n||!q||!a) { $('regError').textContent='Semua field wajib diisi'; return; }
        try {
          const res = await this.api('/api/auth/register', 'POST', { email: e, password: p, name: n, security_question: q, security_answer: a });
          this._pendingEmail = e;
          this.setStep(5); // verifikasi
          toast('Kode verifikasi: ' + (res.verification_code || 'cek log server'));
        } catch(e) { $('regError').textContent = e.message; }
      }
      async verifyEmail() {
        const code = $('verifyCode').value.trim();
        if (!code) { $('verifyError').textContent = 'Masukkan kode'; return; }
        try {
          await this.api('/api/auth/verify-email', 'POST', { email: this._pendingEmail, code });
          toast('Email terverifikasi! Silakan login.');
          this.setStep(1);
        } catch(e) { $('verifyError').textContent = e.message; }
      }
      async forgotPassword() {
        const e = $('forgotEmail').value.trim().toLowerCase();
        if (!e) return toast('Masukkan email','error');
        try {
          const res = await this.api('/api/auth/forgot-password', 'POST', { email: e });
          this._pendingEmail = e;
          $('resetQuestion').textContent = res.security_question;
          this.setStep(7);
        } catch(e) { toast(e.message,'error'); }
      }
      async resetPassword() {
        const ans = $('resetAnswer').value.trim(), newP = $('resetNewPass').value;
        if (!ans||!newP) { $('resetError').textContent = 'Isi semua'; return; }
        try {
          await this.api('/api/auth/reset-password', 'POST', { email: this._pendingEmail, security_answer: ans, new_password: newP });
          toast('Password direset! Silakan login.');
          this.setStep(1);
        } catch(e) { $('resetError').textContent = e.message; }
      }
      async loadProfile() {
        const res = await this.api('/api/user/me');
        this.user = res.username; this.isOwner = res.role === 'owner';
      }
      logout() {
        this.token=''; localStorage.removeItem('token'); this.user=null; this.isOwner=false;
        $('appContainer').classList.remove('show'); $('loginOverlay').classList.remove('hidden');
      }
      showApp() {
        $('loginOverlay').classList.add('hidden'); $('appContainer').classList.add('show');
        $('sidebarName').textContent = this.user;
        $('sidebarAvatar').textContent = this.user[0].toUpperCase();
        $('navOwner').style.display = this.isOwner ? 'flex' : 'none';
      }
      bindNav() {
        document.querySelectorAll('.sidebar-nav a').forEach(a => a.onclick = () => this.navigate(a.dataset.page));
      }
      navigate(page) {
        document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
        const nav = document.querySelector(`.sidebar-nav a[data-page="${page}"]`);
        if (nav) nav.classList.add('active');
        $('pageTitle').textContent = { dashboard:'Dashboard', deploy:'Deploy', redeploy:'Redeploy', tools:'Tools', chat:'Chat', owner:'Owner Panel' }[page] || 'Dashboard';
        this.render(page);
      }
      render(page) {
        const area = $('contentArea');
        const t = {
          dashboard: `<div class="section"><div class="section-title"><i class="fas fa-history"></i> Log Deploy</div><div id="deployLogContainer">Memuat...</div></div>`,
          deploy: `<div class="section"><div class="section-title"><i class="fas fa-rocket"></i> Deploy</div><div class="upload-zone" id="uploadZone"><i class="fas fa-cloud-upload-alt" style="font-size:2rem;color:var(--gold);"></i><div>Drop file / klik</div></div><input type="file" id="fileInput" multiple style="display:none;"><div class="file-chips" id="fileChips"></div><textarea class="form-textarea" id="htmlCode" placeholder="Atau tulis kode...">${this.deployState.htmlCode}</textarea><input class="form-input" id="projectName" value="${this.deployState.projectName}" placeholder="Project Name"><button class="btn btn-primary" id="deployBtn" style="margin-top:10px;">🚀 Deploy</button></div>`,
          redeploy: `<div class="section"><div class="section-title"><i class="fas fa-sync-alt"></i> Redeploy</div><input class="form-input" id="redeployUrl" value="${this.redeployState.url}" placeholder="URL project"><input class="form-input" id="redeployProjectName" value="${this.redeployState.projectName}" placeholder="Nama Project"><div class="upload-zone" id="uploadZoneRedeploy"><i class="fas fa-cloud-upload-alt" style="font-size:2rem;color:var(--gold);"></i><div>Drop file baru</div></div><input type="file" id="fileInputRedeploy" multiple style="display:none;"><div class="file-chips" id="fileChipsRedeploy"></div><textarea class="form-textarea" id="htmlCodeRedeploy" placeholder="Kode baru...">${this.redeployState.htmlCode}</textarea><button class="btn btn-primary" id="redeployBtn">🔄 Update</button></div>`,
          tools: `<div class="section"><div class="section-title"><i class="fas fa-tools"></i> Tools</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;"><div class="card"><h3 style="color:var(--gold);">Password Generator</h3><input type="number" class="form-input" id="passLength" value="16"><button class="btn btn-primary btn-sm" id="genPassBtn">Generate</button><div id="passResult" style="margin-top:8px;font-family:var(--mono);"></div></div><div class="card"><h3 style="color:var(--gold);">Base64</h3><textarea class="form-textarea" id="base64Input"></textarea><button class="btn btn-primary btn-sm" id="b64EncodeBtn">Encode</button><button class="btn btn-ghost btn-sm" id="b64DecodeBtn">Decode</button><div id="base64Result" style="margin-top:8px;font-family:var(--mono);"></div></div></div></div>`,
          chat: `<div class="section"><div class="section-title"><i class="fas fa-comments"></i> Chat</div><div class="chat-container"><div style="padding:12px;border-bottom:1px solid var(--border);"><select id="chatPartnerSelect" class="form-input" style="margin:0;"></select></div><div class="chat-messages" id="chatMessages"><div style="text-align:center;color:var(--text3);padding:20px;">Pilih partner</div></div><div style="display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);"><input class="form-input" id="chatInput" placeholder="Ketik pesan..." style="margin:0;"><button class="btn btn-primary btn-sm" id="sendChatBtn"><i class="fas fa-paper-plane"></i></button></div></div></div>`,
          owner: `<div class="section"><div class="section-title"><i class="fas fa-crown"></i> Owner Panel</div><div id="ownerLogContainer"></div></div>`
        };
        area.innerHTML = t[page] || '<p>Halaman tidak tersedia.</p>';
        if (page === 'dashboard') this.loadLogs();
        if (page === 'deploy') this.bindDeploy();
        if (page === 'redeploy') this.bindRedeploy();
        if (page === 'tools') this.bindTools();
        if (page === 'chat') this.bindChat();
        if (page === 'owner') this.bindOwner();
      }
      bindDeploy() {
        this.setupUpload('uploadZone','fileInput','fileChips', this.deployState.files);
        $('htmlCode').oninput = () => this.deployState.htmlCode = $('htmlCode').value;
        $('projectName').oninput = () => this.deployState.projectName = $('projectName').value;
        $('deployBtn').onclick = () => this.deploy('new');
      }
      bindRedeploy() {
        this.setupUpload('uploadZoneRedeploy','fileInputRedeploy','fileChipsRedeploy', this.redeployState.files);
        $('htmlCodeRedeploy').oninput = () => this.redeployState.htmlCode = $('htmlCodeRedeploy').value;
        $('redeployUrl').oninput = () => this.redeployState.url = $('redeployUrl').value;
        $('redeployProjectName').oninput = () => this.redeployState.projectName = $('redeployProjectName').value;
        $('redeployBtn').onclick = () => this.deploy('redeploy');
      }
      setupUpload(zoneId, inputId, chipsId, arr) {
        const zone = $(zoneId), input = $(inputId);
        zone.onclick = () => input.click();
        input.onchange = () => { for (let f of input.files) if (!arr.find(x => x.name === f.name)) arr.push(f); this.renderChips(arr, chipsId); input.value = ''; };
        zone.ondragover = e => e.preventDefault();
        zone.ondrop = e => { e.preventDefault(); for (let f of e.dataTransfer.files) if (!arr.find(x => x.name === f.name)) arr.push(f); this.renderChips(arr, chipsId); };
      }
      renderChips(arr, chipsId) {
        const c = $(chipsId); if (!arr.length) { c.innerHTML = ''; return; }
        c.innerHTML = arr.map((f,i) => `<span class="file-chip">${sanitize(f.name)} (${Math.round(f.size/1024)}KB) <span class="chip-remove" data-index="${i}">✕</span></span>`).join('');
        c.querySelectorAll('.chip-remove').forEach(b => b.onclick = e => { arr.splice(parseInt(e.target.dataset.index), 1); this.renderChips(arr, chipsId); });
      }
      async deploy(mode) {
        const s = mode === 'redeploy' ? this.redeployState : this.deployState;
        if (!s.files.length && !s.htmlCode) return toast('Masukkan file/kode', 'error');
        const name = (s.projectName || 'safrul-deploy').replace(/[^a-z0-9-]/g,'-') + '-' + Date.now().toString().slice(-8);
        try {
          const payload = { project_name: name, html_code: s.htmlCode, files: [] };
          for (let f of s.files) payload.files.push({ file: f.name, data: await new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result.split(',')[1]); fr.readAsDataURL(f); }), encoding: 'base64' });
          const res = await this.api('/api/deploy', 'POST', payload);
          toast('✅ LIVE! ' + res.url); window.open(res.url, '_blank');
          this.loadLogs();
        } catch(e) { toast('❌ ' + e.message, 'error'); }
      }
      async loadLogs() {
        try {
          const logs = await this.api('/api/deploy/logs');
          const c = $('deployLogContainer');
          if (!Array.isArray(logs) || logs.length === 0) { c.innerHTML = 'Belum ada deployment.'; return; }
          c.innerHTML = logs.map(l => `<div style="padding:8px;border-bottom:1px solid var(--border);font-size:0.8rem;">${sanitize(l.project_name)} - <a href="${sanitize(l.url)}" target="_blank" style="color:var(--gold);">Link</a> - ${l.status==='success'?'✅':'❌'}</div>`).join('');
        } catch(e) { $('deployLogContainer').innerHTML = 'Gagal memuat.'; }
      }
      bindTools() {
        $('genPassBtn').onclick = () => { const len = parseInt($('passLength').value) || 16; $('passResult').textContent = Array.from({ length: len }, () => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*'[Math.floor(Math.random()*72)]).join(''); };
        $('b64EncodeBtn').onclick = () => $('base64Result').textContent = btoa($('base64Input').value);
        $('b64DecodeBtn').onclick = () => { try { $('base64Result').textContent = atob($('base64Input').value); } catch(e) { $('base64Result').textContent = 'Error'; } };
      }
      bindChat() {
        $('chatPartnerSelect').onchange = () => this.renderChat();
        $('sendChatBtn').onclick = () => {
          const p = $('chatPartnerSelect').value, t = $('chatInput').value.trim();
          if (!p || !t) return;
          this.api('/api/chat/send', 'POST', { to: p, text: t }).then(() => { $('chatInput').value = ''; this.renderChat(); });
        };
        setInterval(() => { if ($('contentArea').querySelector('#chatMessages')) this.renderChat(); }, 2000);
        this.populateChatPartners();
      }
      async populateChatPartners() {
        try {
          const users = await this.api('/api/owner/users');
          const s = $('chatPartnerSelect'); if (!s) return;
          s.innerHTML = users.filter(u => u.username !== this.user).map(u => `<option value="${u.username}">${u.username}</option>`).join('');
        } catch(e) {}
      }
      async renderChat() {
        const p = $('chatPartnerSelect')?.value; if (!p) return;
        const cid = [this.user, p].sort().join('_');
        try {
          const msgs = await this.api(`/api/chat/messages/${cid}`);
          $('chatMessages').innerHTML = msgs.map(m => `<div class="chat-msg ${m.sender===this.user?'sent':'received'}">${sanitize(m.text)}</div>`).join('');
        } catch(e) {}
      }
      bindOwner() {
        this.loadOwnerLogs();
      }
      async loadOwnerLogs() {
        try {
          const logs = await this.api('/api/deploy/logs');
          const c = $('ownerLogContainer');
          c.innerHTML = logs.map(l => `<div style="padding:8px;border-bottom:1px solid var(--border);">${sanitize(l.user)} - ${sanitize(l.project_name)} - ${l.status==='success'?'✅':'❌'}</div>`).join('');
        } catch(e) {}
      }
    }
    window.app = new App();
    $('btnLogoutSide').onclick = () => window.app.logout();
  </script>
</body>
</html>
